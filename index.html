<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kasse</title>
<!-- VERSION: FINAL-QUITTUNG-LAYOUT-NO-FIREBASE-2026-06-23 -->
<link rel="apple-touch-icon" href="apple-touch-icon.PNG">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Kasse">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#000;color:white;margin:0;overflow:hidden}
.top{position:fixed;top:0;left:0;right:0;background:#000;padding:15px;z-index:1000}.content{position:absolute;top:185px;bottom:138px;left:0;right:0;overflow-y:auto;padding:15px}.bottom{position:fixed;bottom:8px;left:0;right:0;background:#000;padding:15px;z-index:1000}.header{position:relative;height:50px;margin-bottom:10px}.title{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:22px;font-weight:800}.logo{position:absolute;right:0;top:50%;transform:translateY(-50%);width:58px;height:auto}.nameRow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.field,.dropdown{width:100%;padding:12px;border-radius:12px;border:none;background:#1c1c1f;color:white;font-size:17px;height:46px}.dropdown{margin-top:10px;display:flex;align-items:center;color:#aaa}.dropdown.active{color:white}.dropdownList{display:none;margin-top:6px;background:#1c1c1f;border-radius:12px;overflow:hidden}.dropdownList div{padding:14px;border-bottom:1px solid #2a2a2a}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{background:#1c1c1f;padding:8px;border-radius:14px;text-align:center;white-space:pre-line;min-height:70px;display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1.25}.btn.active{background:#007aff}.btn.error,.error{border:2px solid #ff3b30!important}.total{background:#fff;color:#000;padding:15px;border-radius:18px;text-align:center;font-size:26px;font-weight:400;margin-bottom:8px}
.actionRow{display:flex!important;flex-direction:row!important;gap:8px!important;width:100%!important;align-items:stretch!important}
.actionRow button{flex:1 1 0!important;min-width:0!important;width:auto!important;height:50px!important;border-radius:15px!important;border:none!important;color:white!important;font-size:14.5px!important;font-weight:600!important;padding:0 6px!important;white-space:nowrap!important}
button{width:100%;height:56px;border-radius:15px;border:none;color:white;font-size:15px;font-weight:600;padding:0}.copyBtn{background:#007aff}.barBtn{background:#34c759}.success{background:#34c759!important}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:9999;padding:16px}.worldlineBox{width:100%;max-width:360px;min-height:650px;background:#fafafa;color:#333;border-radius:18px;padding:26px 20px;display:flex;flex-direction:column;align-items:center}.wlTop{font-size:20px;margin:4px 0 18px}.wlAmount{font-size:40px;font-weight:300;margin-bottom:28px}.checkCircle{width:132px;height:132px;border:6px solid #6b9da0;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 0 34px}.checkCircle span{font-size:78px;color:#6b9da0;transform:translateY(-5px)}.wlText{align-self:flex-start;font-size:15px;color:#555;margin:0 0 10px}.optionBtn{height:56px;border-radius:12px;border:1px solid #cfcfcf;background:#fff;color:#333;margin-bottom:10px;font-size:18px;font-weight:600;display:grid;grid-template-columns:54px 1fr;align-items:center;text-align:left;padding:0 12px}.optionBtn .ico{font-size:25px;text-align:center;color:#555}.cancelBtn{margin-top:auto;height:48px;border-radius:23px;border:1px solid #aaa;background:#fff;color:#444;font-weight:400}.dialog{width:100%;max-width:360px;background:#fff;color:#111;border-radius:18px;padding:20px}.dialog h2{margin:0 0 12px;font-size:24px}.dialog p{color:#555}.dialog input{width:100%;height:46px;border:1px solid #ccc;border-radius:12px;padding:12px;font-size:16px;margin-bottom:12px}.dialogRow{display:grid;grid-template-columns:1fr 1fr;gap:10px}.dialog button{height:46px;color:white}.grey{background:#eee!important;color:#333!important}.teal{background:#4aaeb2!important}.qrImg{display:block;margin:12px auto;width:230px;height:230px}.receiptView{position:fixed;inset:0;background:#111;display:none;z-index:10000;overflow:auto;padding:18px 10px}
.receiptPaper{background:#fff;color:#000;width:min(100%,460px);margin:0 auto 18px;border-radius:0;padding:28px 20px 18px;font-family:Montserrat,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-weight:300;line-height:1.25;min-height:auto}
.receiptLogo{display:block;width:190px;max-width:68%;margin:0 auto 16px}
.receiptShop{text-align:center;font-size:13px;letter-spacing:.6px;font-weight:300;white-space:nowrap;margin:0 auto 10px;color:#111}
.receiptSep{color:#c8cf04;margin:0 7px;font-weight:400}
.receiptDashed{border-top:1px dashed #111;margin:10px 0 26px}
.receiptTitle{text-align:left;font-weight:400;font-size:28px;letter-spacing:2px;margin:0 0 26px}
.receiptInfo{display:grid;grid-template-columns:1fr 1fr;gap:12px 34px;margin-bottom:18px;font-size:14px;letter-spacing:.4px}
.receiptPair{display:grid;grid-template-columns:92px 1fr;column-gap:16px;align-items:baseline;white-space:nowrap}
.receiptPair span{font-weight:300}.receiptPair b{font-weight:300}
.receiptSolid{border-top:2px solid #111;margin:12px 0 18px}
.receiptServicesTitle{font-size:15px;font-weight:600;margin:0 0 14px;letter-spacing:.2px}
.receiptServices{width:100%;border-collapse:collapse;font-size:14px;letter-spacing:.25px;font-weight:300}
.receiptServices tr{border-bottom:1px solid rgba(0,0,0,.23)}
.receiptServices tr:last-child{border-bottom:none}
.receiptServices td{padding:9px 0;vertical-align:top}
.receiptServices .svcName{display:flex;gap:10px;align-items:flex-start;line-height:1.25;padding-right:10px}
.receiptServices .bullet{flex:0 0 auto;font-size:15px;line-height:1.25}.receiptServices .txt{display:block;min-width:0}
.receiptServices .price{text-align:right;white-space:nowrap;font-weight:300;width:112px}
.receiptTotals{border-top:2px solid #111;border-bottom:2px solid #111;margin:14px 0 12px;padding:12px 0 10px;font-size:14px;letter-spacing:.3px}
.receiptTotalRow{display:grid;grid-template-columns:1fr auto;align-items:baseline;margin:0 0 12px}.receiptTotalRow:last-child{margin-bottom:0}
.receiptTotalRow .label{font-weight:300}.receiptTotalRow .value{font-weight:700;white-space:nowrap}.receiptVat{font-size:12px;font-weight:300;margin-top:-4px}
.receiptThanks{text-align:center;margin-top:10px}.receiptHeart{width:26px;height:26px;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;color:#c8cf04;font-size:30px;line-height:1;font-weight:300}
.receiptScript{font-family:"Segoe Script","Brush Script MT",cursive;font-size:24px;line-height:1.1;font-weight:400;margin:0 0 4px}.receiptSub{font-size:12px;font-weight:300;letter-spacing:.25px}
.closeReceipt{max-width:460px;margin:0 auto 40px;display:block;background:#007aff;height:54px}

/* FINAL OVERRIDE: Copy + Barzahlung auf einer Zeile, dünner */
.bottom .actionRow{display:flex!important;flex-direction:row!important;gap:8px!important;width:100%!important}
.bottom .actionRow button{flex:1 1 0!important;width:auto!important;height:50px!important;border-radius:15px!important;font-size:14.5px!important;white-space:nowrap!important}
</style>
</head>
<body>
<div class="top"><div class="header"><div class="title">Kasse</div><img src="logo.PNG" class="logo"></div><div class="nameRow"><input id="vorname" class="field" placeholder="Vorname" oninput="resetState()"><input id="nachname" class="field" placeholder="Nachname" oninput="resetState()"></div><div id="dropdown" class="dropdown" onclick="toggleDropdown()"><div id="selectedTarif">Tarif</div></div><div id="dropdownList" class="dropdownList"><div onclick="selectTarif('Standard')">Standard</div><div onclick="selectTarif('Lehrling')">Lehrling</div></div></div>
<div class="content"><div id="buttons" class="grid"></div></div>
<div class="bottom"><div id="total" class="total">CHF 0.00</div><div class="actionRow"><button id="copyBtn" class="copyBtn" onclick="copyWorldline()">Copy für Worldline</button><button id="barBtn" class="barBtn" onclick="openBarPopup()">Barzahlung</button></div></div>

<div id="barOverlay" class="overlay"><div class="worldlineBox"><div class="wlTop">Zahlung beendet</div><div id="wlAmount" class="wlAmount">CHF 0.00</div><div class="checkCircle"><span>✓</span></div><div class="wlText">Wählen Sie eine Option für den Transaktionsbeleg</div><button class="optionBtn" onclick="openEmailBox()"><span class="ico">✉️</span><span>E-Mail</span></button><button class="optionBtn" onclick="openQrBox()"><span class="ico">▦</span><span>QR-Code</span></button><button class="optionBtn" onclick="showReceipt()"><span class="ico">📄</span><span>Details anzeigen</span></button><button class="optionBtn" onclick="changeBack()"><span class="ico">✏️</span><span>Ändern</span></button><button class="cancelBtn" onclick="noReceiptWanted()">Keine Quittung gewünscht</button></div></div>
<div id="emailOverlay" class="overlay"><div class="dialog"><h2>Transaktionsbeleg</h2><p>Bitte geben Sie Ihre E-Mail Adresse ein.</p><input id="emailInput" type="email" placeholder="E-Mail"><div class="dialogRow"><button class="grey" onclick="closeEmailBox()">Abbrechen</button><button class="teal" onclick="sendEmailTest()">Senden</button></div></div></div>
<div id="qrOverlay" class="overlay"><div class="dialog"><h2>Transaktionsbeleg</h2><p>Bitte scannen Sie diesen Code mit Ihrem Gerät.</p><img id="qrImg" class="qrImg" alt="QR-Code"><button class="grey" onclick="closeQrBox()">Schliessen</button></div></div>
<div id="receiptView" class="receiptView"><div id="receiptPaper" class="receiptPaper"></div><button class="closeReceipt" onclick="closeReceipt()">Schliessen</button></div>
<script>
let tarif=null, selected=[], lastReceipt=null;
const standard={"Gel-Neumodellage mit Tips":{price:65,n:1},"Gel-Neumodellage Naturnagel":{price:55,n:2},"Auffüllen Natur":{price:55,n:3},"Farbe":{price:10,n:4},"French":{price:10,n:5},"Chrom":{price:10,n:6},"Reparatur pro Nagel":{price:5,n:7},"Entfernen Gel/Acryl":{price:30,n:8},"Augenbrauen zupfen":{price:15,n:9},"Augenbrauen färben":{price:15,n:10},"Wimpernlifting & färben":{price:60,n:11},"Wimpernverlängerung Volumen":{price:90,n:12},"Wimpern Volumen auffüllen":{price:60,n:13},"Wimpernverlängerung Natur":{price:80,n:14},"Wimpern Natur auffüllen":{price:50,n:15},"Wimpern entfernen":{price:20,n:16}};
const lehrling={"Gel-Neumodellage mit Tips":{price:55,n:17},"Gel-Neumodellage Naturnagel":{price:45,n:18},"Auffüllen Natur":{price:45,n:19},"Wimpernverlängerung Volumen":{price:80,n:20},"Wimpern Volumen auffüllen":{price:50,n:21},"Wimpernverlängerung Natur":{price:70,n:22},"Wimpern Natur auffüllen":{price:50,n:23},"Wimpern entfernen":{price:20,n:24}};
function getPreis(name){return (tarif==="Lehrling"&&lehrling[name])?lehrling[name].price:standard[name].price} function getNummer(name){return (tarif==="Lehrling"&&lehrling[name])?lehrling[name].n:standard[name].n}
function render(){let c=document.getElementById('buttons');c.innerHTML='';Object.keys(standard).forEach(name=>{let d=document.createElement('div');d.className='btn'+(selected.includes(name)?' active':'');d.innerText=name+'\nCHF '+getPreis(name);d.onclick=()=>{selected.includes(name)?selected=selected.filter(s=>s!==name):selected.push(name);render();calc();resetState()};c.appendChild(d)})}
function calc(){document.getElementById('total').innerText='CHF '+total().toFixed(2)} function total(){return selected.reduce((s,n)=>s+getPreis(n),0)}
function toggleDropdown(){let d=document.getElementById('dropdownList');d.style.display=d.style.display==='block'?'none':'block'} function selectTarif(t){tarif=t;document.getElementById('selectedTarif').innerText=t;document.getElementById('dropdown').classList.add('active');document.getElementById('dropdownList').style.display='none';render();calc();resetState()}
function validate(){let ok=true,vor=document.getElementById('vorname'),nach=document.getElementById('nachname'),drop=document.getElementById('dropdown');if(!vor.value.trim()){vor.classList.add('error');ok=false} if(!nach.value.trim()){nach.classList.add('error');ok=false} if(!tarif){drop.classList.add('error');ok=false} if(selected.length===0){document.querySelectorAll('.btn').forEach(b=>b.classList.add('error'));ok=false} return ok}
function resetState(){document.getElementById('vorname').classList.remove('error');document.getElementById('nachname').classList.remove('error');document.getElementById('dropdown').classList.remove('error');document.querySelectorAll('.btn').forEach(b=>b.classList.remove('error'));let btn=document.getElementById('copyBtn');btn.innerText='Copy für Worldline';btn.classList.remove('success')}
function clearAll(){document.getElementById('vorname').value='';document.getElementById('nachname').value='';tarif=null;selected=[];document.getElementById('selectedTarif').innerText='Tarif';document.getElementById('dropdown').classList.remove('active');render();calc();resetState()}
function nextBarNumber(commit){
let n=parseInt(localStorage.getItem('mrbeauty_bar_counter')||'0',10)+1;
if(commit) localStorage.setItem('mrbeauty_bar_counter', String(n));
return 'BAR-'+String(n).padStart(5,'0');
}
function data(commitNo){let now=new Date(),pad=n=>String(n).padStart(2,'0'),ds=pad(now.getDate())+'.'+pad(now.getMonth()+1)+'.'+now.getFullYear(),ts=pad(now.getHours())+':'+pad(now.getMinutes()),no=nextBarNumber(!!commitNo);return {datum:ds,uhrzeit:ts,beleg:no,vor:document.getElementById('vorname').value.trim(),nach:document.getElementById('nachname').value.trim(),tarif:tarif,tarifKurz:tarif==='Standard'?'S':'L',services:[...selected],codes:selected.map(getNummer).sort((a,b)=>a-b),betrag:total()}}
function saveBarzahlung(quittung){
let d=lastReceipt || data(false);
if(!d._saved){ d.beleg=nextBarNumber(true); d._saved=true; }
d.quittung=quittung;
let list=JSON.parse(localStorage.getItem('mrbeauty_barzahlungen')||'[]');
if(!list.find(x=>x.beleg===d.beleg)){
  list.push({datum:d.datum,uhrzeit:d.uhrzeit,beleg:d.beleg,referenz:d.vor+' '+d.nach+', '+d.tarifKurz+', '+d.codes.join('+'),betrag:d.betrag,zahlungsart:'Bar',quittung:quittung});
  localStorage.setItem('mrbeauty_barzahlungen', JSON.stringify(list));
}
lastReceipt=d; return d;
}
function copyWorldline(){if(!validate())return;let d=data();let text=d.vor+' '+d.nach+', '+d.tarifKurz+', '+d.codes.join('+');navigator.clipboard.writeText(text);let btn=document.getElementById('copyBtn');btn.innerText='Kopiert ✓';btn.classList.add('success');setTimeout(clearAll,700)}
function openBarPopup(){if(!validate())return;lastReceipt=data(false);document.getElementById('wlAmount').innerText='CHF '+lastReceipt.betrag.toFixed(2);document.getElementById('barOverlay').style.display='flex'}
function changeBack(){document.getElementById('barOverlay').style.display='none'}
function noReceiptWanted(){saveBarzahlung('Nein');document.getElementById('barOverlay').style.display='none';clearAll()}
function receiptText(){
let d=lastReceipt||data();
return `MR Beauty Vlora Iseni | Adlikerstrasse 255 | 8105 Regensdorf

QUITTUNG
Quittung Nr.: ${d.beleg}
Kundin: ${d.vor} ${d.nach}
Datum: ${d.datum}
Uhrzeit: ${d.uhrzeit}

Leistungen:
${d.services.map(s=>'- '+s+' CHF '+getPreis(s).toFixed(2)).join('
')}

Betrag: CHF ${d.betrag.toFixed(2)}
Zahlungsart: Barzahlung
Nicht MWST-pflichtig`}
function receiptHtml(){
let d=lastReceipt||data();
let serviceRows=d.services.map(s=>`<tr><td><div class="svcName"><span class="bullet">•</span><span class="txt">${s}</span></div></td><td class="price">CHF&nbsp;&nbsp;${getPreis(s).toFixed(2)}</td></tr>`).join('');
return `<img src="receipt-logo.png" class="receiptLogo">
<div class="receiptShop">MR Beauty Vlora Iseni <span class="receiptSep">|</span> Adlikerstrasse 255 <span class="receiptSep">|</span> 8105 Regensdorf</div>
<div class="receiptDashed"></div>
<div class="receiptTitle">QUITTUNG</div>
<div class="receiptInfo">
  <div class="receiptPair"><span>Quittung Nr.:</span><b>${d.beleg}</b></div>
  <div class="receiptPair"><span>Datum:</span><b>${d.datum}</b></div>
  <div class="receiptPair"><span>Kundin:</span><b>${d.vor} ${d.nach}</b></div>
  <div class="receiptPair"><span>Uhrzeit:</span><b>${d.uhrzeit}</b></div>
</div>
<div class="receiptSolid"></div>
<div class="receiptServicesTitle">Leistungen</div>
<table class="receiptServices"><tbody>${serviceRows}</tbody></table>
<div class="receiptTotals">
  <div class="receiptTotalRow"><span class="label">Betrag:</span><span class="value">CHF&nbsp;&nbsp;${d.betrag.toFixed(2)}</span></div>
  <div class="receiptTotalRow"><span class="label">Zahlungsart:</span><span class="value">Barzahlung</span></div>
  <div class="receiptVat">Nicht MWST-pflichtig</div>
</div>
<div class="receiptThanks"><div class="receiptHeart">♡</div><div class="receiptScript">Vielen Dank für Ihren Besuch!</div><div class="receiptSub">Wir freuen uns, Sie bald wieder begrüssen zu dürfen.</div></div>`}
function showReceipt(){document.getElementById('receiptPaper').innerHTML=receiptHtml();document.getElementById('receiptView').style.display='block'} function closeReceipt(){document.getElementById('receiptView').style.display='none'}
function openEmailBox(){document.getElementById('emailOverlay').style.display='flex'} function closeEmailBox(){document.getElementById('emailOverlay').style.display='none'} function sendEmailTest(){saveBarzahlung('Ja');let email=document.getElementById('emailInput').value.trim();let subject=encodeURIComponent('MR Beauty Barzahlungs-Quittung');let body=encodeURIComponent(receiptText());location.href='mailto:'+encodeURIComponent(email)+'?subject='+subject+'&body='+body;setTimeout(function(){document.getElementById('emailOverlay').style.display='none';document.getElementById('barOverlay').style.display='none';clearAll()},600)}
function openQrBox(){saveBarzahlung('Ja');let txt=encodeURIComponent(receiptText());document.getElementById('qrImg').src='https://api.qrserver.com/v1/create-qr-code/?size=230x230&data='+txt;document.getElementById('qrOverlay').style.display='flex'} function closeQrBox(){document.getElementById('qrOverlay').style.display='none'}
render();calc();
</script>
</body>
</html>
