<style>
:root{--gelb:#C8CF04;--dark:#1c1c1f;--blue:#007aff;--green:#34c759;}
*{box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;background:#000;color:white;margin:0;overflow:hidden;}
.top{position:fixed;top:0;left:0;right:0;background:#000;padding:15px;z-index:1000;}
.content{position:absolute;top:185px;bottom:170px;left:0;right:0;overflow-y:auto;padding:15px;}
.bottom{position:fixed;bottom:10px;left:0;right:0;background:#000;padding:15px;z-index:1000;}
.header{position:relative;height:50px;margin-bottom:10px;}
.title{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:22px;font-weight:bold;}
.logo{position:absolute;right:0;top:50%;transform:translateY(-50%);width:48px;height:auto;}
.nameRow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.field,.dropdown{width:100%;padding:12px;border-radius:12px;border:none;background:#1c1c1f;color:white;font-size:17px;height:46px;box-sizing:border-box;}
.dropdown{margin-top:10px;display:flex;align-items:center;color:#aaa;}
.dropdown.active{color:white;}.dropdownList{display:none;margin-top:6px;background:#1c1c1f;border-radius:12px;overflow:hidden;}.dropdownList div{padding:14px;border-bottom:1px solid #2a2a2a;}

.actionRow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}button{width:100%;padding:14px;border-radius:14px;border:none;background:#007aff;color:white;font-size:17px;font-weight:600;}button.success{background:#34c759;}.barBtn{background:#34c759;}.error{border:2px solid #ff3b30 !important;}
/* Zahlung Modal */
.modalShade{display:none;position:fixed;inset:0;background:rgba(0,0,0,.68);z-index:5000;align-items:center;justify-content:center;padding:16px;}
.modalShade.show{display:flex;}.payCard{width:min(390px,calc(100vw - 32px));max-height:calc(100vh - 48px);overflow:auto;background:#f7f7f7;color:#333;border-radius:18px;padding:28px 22px 24px;text-align:center;}
.payTitle{font-size:28px;font-weight:400;margin:0 0 18px;}.payAmount{font-size:54px;font-weight:300;margin:0 0 26px;letter-spacing:-1px;}.payCheck{width:150px;height:150px;border:8px solid var(--gelb);border-radius:50%;margin:0 auto 32px;position:relative;}
.payCheck:after{content:"";position:absolute;left:37px;top:43px;width:66px;height:36px;border-left:8px solid var(--gelb);border-bottom:8px solid var(--gelb);transform:rotate(-45deg);transform-origin:center;}
.payText{text-align:left;font-size:18px;line-height:1.25;color:#555;margin:0 0 14px;}.payOption{height:58px;border:1.4px solid #d0d0d0;background:white;color:#333;border-radius:14px;margin:10px 0;display:flex;align-items:center;padding:0 26px;font-size:24px;font-weight:800;gap:18px;}.payOption span:first-child{width:28px;text-align:center;font-size:22px;}.payNoReceipt{margin-top:18px;height:54px;border:1.4px solid #aaa;background:white;color:#444;border-radius:28px;font-size:19px;font-weight:400;}
/* Quittung */
.receiptView{display:none;position:fixed;inset:0;background:#111;z-index:7000;overflow-y:auto;overflow-x:hidden;padding:18px 14px 120px;}
.receiptView.show{display:block;}.receiptPaper{width:min(760px,calc(100vw - 28px));margin:0 auto;background:#fff;color:#000;padding:34px 34px 28px;font-family:"Montserrat",-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;box-shadow:0 0 0 1px rgba(0,0,0,.04);overflow:visible;}
.receiptLogo{display:block;width:min(260px,58vw);height:auto;margin:0 auto 22px;}.receiptCompany{white-space:nowrap;text-align:center;font-weight:300;font-size:clamp(10px,2.7vw,20px);letter-spacing:.04em;margin-bottom:12px;}.receiptCompany .sep{color:var(--gelb);padding:0 .7em;}
.receiptDash{border-top:1.2px dashed #000;margin:0 0 34px;}.receiptTitle{font-size:clamp(32px,8vw,48px);line-height:1;font-weight:700;letter-spacing:.01em;margin:0 0 42px;}.receiptInfo{display:grid;grid-template-columns:1fr 1fr;gap:clamp(18px,9vw,110px);margin-bottom:24px;font-weight:300;font-size:clamp(18px,4vw,26px);}.receiptInfoCol{display:grid;grid-template-columns:max-content 1fr;column-gap:5ch;row-gap:10px;align-items:baseline;}.receiptInfoCol.right{column-gap:5ch;}.receiptValue{font-weight:300;white-space:nowrap;}.receiptRule{border:0;border-top:3px solid #000;margin:18px 0 24px;}.receiptSectionTitle{font-size:clamp(20px,4.6vw,28px);font-weight:700;margin:0 0 22px;}.serviceList{font-size:clamp(18px,4vw,26px);font-weight:300;}.serviceRow{display:grid;grid-template-columns:18px minmax(0,1fr) 56px 74px;gap:10px;align-items:start;margin:0 0 22px;}.serviceBullet{font-weight:400;line-height:1.2;}.serviceName{min-width:0;overflow-wrap:break-word;line-height:1.25;}.serviceCurrency{text-align:right;white-space:nowrap;}.servicePrice{text-align:right;white-space:nowrap;}.summary{font-size:clamp(19px,4.2vw,27px);font-weight:300;}.summaryRow{display:grid;grid-template-columns:1fr max-content;align-items:baseline;margin:0 0 22px;}.summaryValue{font-weight:800;white-space:nowrap;}.vatNote{font-size:clamp(15px,3.3vw,20px);font-weight:300;margin-top:-20px;margin-bottom:28px;}.receiptFooter{text-align:center;margin-top:22px;}.receiptHeart{width:42px;height:auto;margin:0 auto 4px;display:block;}.thanks{font-family:"Brush Script MT","Segoe Script",cursive;font-size:clamp(26px,6.5vw,44px);font-weight:400;line-height:1.05;margin:0 0 6px;}.comeAgain{font-size:clamp(15px,3.3vw,20px);font-weight:300;margin:0;}.closeReceipt{position:fixed;left:14px;right:14px;bottom:12px;z-index:7100;height:62px;border-radius:18px;background:#007aff;color:#fff;font-size:24px;}
@media (max-width:430px){.receiptPaper{padding:28px 22px 24px;}.receiptInfo{gap:18px;}.receiptInfoCol{column-gap:2.3ch;}.serviceRow{grid-template-columns:14px minmax(0,1fr) 44px 62px;gap:8px;margin-bottom:18px;}.receiptRule{border-top-width:2.4px}.receiptTitle{margin-bottom:36px}.receiptLogo{width:min(245px,70vw)}}

body.auth-loading .top,body.auth-loading .content,body.auth-loading .bottom,body.logged-out .top,body.logged-out .content,body.logged-out .bottom{display:none !important;}body.logged-out .loginLock{display:flex;}body.logged-in .loginLock{display:none !important;}.loginLock{display:none;position:fixed;inset:0;background:#000;z-index:20000;justify-content:center;padding:0 24px;overflow:hidden;font-family:-apple-system;color:white;}.loginBox{margin-top:62px;width:100%;max-width:390px;}.loginLogo{width:140px;height:auto;display:block;margin:0 auto 36px auto;}.loginTitle{text-align:center;font-size:34px;font-weight:400;line-height:1;margin:0 0 12px 0;letter-spacing:-1px;}.loginSub{text-align:center;color:#c7c7cc;font-size:18px;line-height:1.25;margin:0 0 42px 0;}.loginFieldWrap{height:76px;border:1.2px solid rgba(255,255,255,.28);border-radius:18px;background:#060606;display:grid;grid-template-columns:52px 1fr 42px;align-items:center;padding:0 14px;margin-bottom:16px;box-sizing:border-box;}.loginIcon,.loginEye,.loginShield{color:#d5dd00;display:flex;align-items:center;justify-content:center;}.loginIcon svg{width:30px;height:30px;stroke:currentColor;fill:none;stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round;}.loginEye{width:42px;height:42px;border:0;background:transparent;padding:0;}.loginEye svg{width:32px;height:32px;stroke:currentColor;fill:none;stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round;}.loginText{min-width:0;}.loginLabel{color:#d5dd00;font-size:16px;line-height:1;margin-bottom:9px;}.loginInput{width:100%;border:0;outline:0;background:transparent;color:white;font-size:18px;line-height:1.15;padding:0;font-family:-apple-system;min-width:0;box-sizing:border-box;}.loginInput::placeholder{color:#b7b7bd;}.loginRow{display:flex;align-items:center;justify-content:space-between;gap:6px;margin:8px 0 36px 0;}.rememberBox{width:auto;height:auto;border:0;background:transparent;padding:0;border-radius:0;display:flex;align-items:center;gap:10px;color:#fff;font-size:16px;white-space:nowrap;}.rememberCheck{width:25px;height:25px;border:2px solid #d5dd00;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#d5dd00;font-size:20px;font-weight:900;line-height:1;}.rememberBox.off .rememberCheck{color:transparent;}.forgotBtn{width:auto;height:auto;border:0;background:transparent;color:#d5dd00;font-size:16px;padding:0;border-radius:0;white-space:nowrap;}.loginBtn{width:100%;height:64px;border:0;border-radius:18px;background:#d5dd00;color:#000;font-size:20px;font-weight:900;position:relative;padding:0;transition:filter .08s ease, transform .05s ease;}.loginBtn:active{filter:brightness(1.16);transform:scale(.99);}.loginError{display:none !important;margin-top:14px;padding:10px 14px;border-radius:14px;text-align:center;font-size:14px;line-height:1.3;background:#3a0707;color:#ff6b6b;}.loginError.show{display:block !important;}.loginHint{display:flex;align-items:center;justify-content:center;gap:10px;color:#bdbdc2;font-size:15px;line-height:1.35;margin-top:38px;text-align:center;}.loginShield svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}.logoutBtn{position:absolute;left:0;top:50%;transform:translateY(-50%);width:auto;height:30px;padding:0 12px;border:1px solid #d5dd00;border-radius:13px;background:transparent;color:#d5dd00;font-size:13px;line-height:30px;z-index:5;}.logoutBtn:active{background:rgba(213,221,0,.18);}
</style>

<body class="auth-loading">
<div id="loginLock" class="loginLock"><div class="loginBox"><img src="logo.png" class="loginLogo" alt="MR BEAUTY"><h1 class="loginTitle">Kasse</h1><p class="loginSub">Bitte melde dich an, um fortzufahren.</p><div class="loginFieldWrap"><div class="loginIcon"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="M3 7l9 6 9-6"></path></svg></div><div class="loginText"><div class="loginLabel">E-Mail</div><input id="loginEmail" class="loginInput" type="email" inputmode="email" autocomplete="username" placeholder="Deine E-Mail-Adresse"></div><div></div></div><div class="loginFieldWrap"><div class="loginIcon"><svg viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="2"></rect><path d="M8 10V7a4 4 0 0 1 8 0v3"></path><path d="M12 14v2"></path></svg></div><div class="loginText"><div class="loginLabel">Passwort</div><input id="loginPassword" class="loginInput" type="password" autocomplete="current-password" placeholder="Dein Passwort"></div><button type="button" class="loginEye" onclick="toggleLoginPassword()"><svg viewBox="0 0 24 24"><path d="M1.8 12s3.8-6 10.2-6 10.2 6 10.2 6-3.8 6-10.2 6S1.8 12 1.8 12z"></path><circle cx="12" cy="12" r="3"></circle></svg></button></div><div class="loginRow"><button type="button" id="rememberBox" class="rememberBox" onclick="toggleRemember()"><span class="rememberCheck">✓</span><span>Angemeldet bleiben</span></button><button type="button" class="forgotBtn" onclick="forgotPassword()">Passwort vergessen?</button></div><button type="button" id="loginBtn" class="loginBtn" onclick="loginWithFirebase()">Login</button><div id="loginError" class="loginError"></div><div class="loginHint"><span class="loginShield"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg></span><span>Nur autorisierte Personen haben Zugriff.</span></div></div></div>
<div class="top"><div class="header"><button id="logoutBtn" class="logoutBtn" onclick="logoutFirebase()">Abmelden</button><div class="title">Kasse</div><img src="logo.png" class="logo"></div><div class="nameRow"><input id="vorname" class="field" placeholder="Vorname" oninput="resetState()"><input id="nachname" class="field" placeholder="Nachname" oninput="resetState()"></div><div id="dropdown" class="dropdown" onclick="toggleDropdown()"><div id="selectedTarif">Tarif</div></div><div id="dropdownList" class="dropdownList"><div onclick="selectTarif('Standard')">Standard</div><div onclick="selectTarif('Lehrling')">Lehrling</div></div></div>

<script>
/* FIREBASE AUTH LOGIN */
const firebaseConfig={apiKey:"AIzaSyBeUdo8xgLdwdMh-t2RU5z37Z6LIeZsXTQ",authDomain:"mr-beauty-apps.firebaseapp.com",projectId:"mr-beauty-apps",storageBucket:"mr-beauty-apps.firebasestorage.app",messagingSenderId:"470222444902",appId:"1:470222444902:web:c54872a96d964a78ca90a7"};
firebase.initializeApp(firebaseConfig);const auth=firebase.auth();let rememberLogin=localStorage.getItem("mrbeauty_kasse_remember")!=="0";
function applyRememberUI(){const box=document.getElementById("rememberBox");if(!box)return;box.classList.toggle("off",!rememberLogin)}function toggleRemember(){rememberLogin=!rememberLogin;localStorage.setItem("mrbeauty_kasse_remember",rememberLogin?"1":"0");applyRememberUI()}function hideLoginError(){const e=document.getElementById("loginError");if(e){e.classList.remove("show");e.innerText=""}}function showLoginError(text){const e=document.getElementById("loginError");if(e){e.innerText=text;e.classList.add("show")}}function toggleLoginPassword(){const p=document.getElementById("loginPassword");if(!p)return;p.type=p.type==="password"?"text":"password"}async function loginWithFirebase(){hideLoginError();const email=document.getElementById("loginEmail").value.trim();const pass=document.getElementById("loginPassword").value;if(!email||!pass){showLoginError("Bitte E-Mail und Passwort eingeben.");return}try{await auth.setPersistence(rememberLogin?firebase.auth.Auth.Persistence.LOCAL:firebase.auth.Auth.Persistence.SESSION);await auth.signInWithEmailAndPassword(email,pass)}catch(err){showLoginError("Login nicht möglich. Bitte E-Mail und Passwort prüfen.")}}async function forgotPassword(){hideLoginError();const email=document.getElementById("loginEmail").value.trim();if(!email){showLoginError("Bitte zuerst deine E-Mail-Adresse eingeben.");return}try{await auth.sendPasswordResetEmail(email);showLoginError("E-Mail zum Zurücksetzen wurde gesendet.")}catch(err){showLoginError("E-Mail konnte nicht gesendet werden. Bitte Adresse prüfen.")}}async function logoutFirebase(){await auth.signOut()}function showLoginOnly(){document.body.classList.remove("auth-loading","logged-in");document.body.classList.add("logged-out")}function showAppAfterLogin(){document.body.classList.remove("auth-loading","logged-out");document.body.classList.add("logged-in")}auth.onAuthStateChanged(function(user){if(user){showAppAfterLogin()}else{showLoginOnly()}});document.addEventListener("DOMContentLoaded",function(){applyRememberUI();hideLoginError();const email=document.getElementById("loginEmail");const pass=document.getElementById("loginPassword");if(email)email.addEventListener("input",hideLoginError);if(pass)pass.addEventListener("input",hideLoginError);if(pass)pass.addEventListener("keydown",function(e){if(e.key==="Enter")loginWithFirebase()});if(email)email.addEventListener("keydown",function(e){if(e.key==="Enter")loginWithFirebase()})});
let tarif=null;let selected=[];let currentReceipt=null;let barDone=false;
const standard={"Gel-Neumodellage mit Tips":{price:65,n:1},"Gel-Neumodellage Naturnagel":{price:55,n:2},"Auffüllen Natur":{price:55,n:3},"Farbe":{price:10,n:4},"French":{price:10,n:5},"Chrom":{price:10,n:6},"Reparatur pro Nagel":{price:5,n:7},"Entfernen Gel/Acryl":{price:30,n:8},"Augenbrauen zupfen":{price:15,n:9},"Augenbrauen färben":{price:15,n:10},"Wimpernlifting & färben":{price:60,n:11},"Wimpernverlängerung Volumen":{price:90,n:12},"Wimpern Volumen auffüllen":{price:60,n:13},"Wimpernverlängerung Natur":{price:80,n:14},"Wimpern Natur auffüllen":{price:50,n:15},"Wimpern entfernen":{price:20,n:16}};
const lehrling={"Gel-Neumodellage mit Tips":{price:55,n:17},"Gel-Neumodellage Naturnagel":{price:45,n:18},"Auffüllen Natur":{price:45,n:19},"Wimpernverlängerung Volumen":{price:80,n:20},"Wimpern Volumen auffüllen":{price:50,n:21},"Wimpernverlängerung Natur":{price:70,n:22},"Wimpern Natur auffüllen":{price:50,n:23},"Wimpern entfernen":{price:20,n:24}};
function getPreis(name){if(tarif==="Lehrling"&&lehrling[name])return lehrling[name].price;return standard[name].price}function getNummer(name){if(tarif==="Lehrling"&&lehrling[name])return lehrling[name].n;return standard[name].n}function totalAmount(){return selected.reduce((sum,s)=>sum+getPreis(s),0)}function render(){let c=document.getElementById("buttons");c.innerHTML="";Object.keys(standard).forEach(name=>{let d=document.createElement("div");d.className="btn";if(selected.includes(name))d.classList.add("active");d.innerText=name+"\nCHF "+getPreis(name);d.onclick=()=>{selected.includes(name)?selected=selected.filter(s=>s!==name):selected.push(name);render();calc();resetState()};c.appendChild(d)})}function calc(){document.getElementById("total").innerText="CHF "+totalAmount().toFixed(2)}function toggleDropdown(){let d=document.getElementById("dropdownList");d.style.display=d.style.display==="block"?"none":"block"}function selectTarif(t){tarif=t;document.getElementById("selectedTarif").innerText=t;document.getElementById("dropdown").classList.add("active");document.getElementById("dropdownList").style.display="none";render();calc();resetState()}
function validateSale(){let vor=document.getElementById("vorname"),nach=document.getElementById("nachname"),drop=document.getElementById("dropdown");let valid=true;if(!vor.value.trim()){vor.classList.add("error");valid=false}if(!nach.value.trim()){nach.classList.add("error");valid=false}if(!tarif){drop.classList.add("error");valid=false}if(selected.length===0){document.querySelectorAll(".btn").forEach(b=>b.classList.add("error"));valid=false}return valid}
function resetState(){document.getElementById("vorname").classList.remove("error");document.getElementById("nachname").classList.remove("error");document.getElementById("dropdown").classList.remove("error");document.querySelectorAll(".btn").forEach(b=>b.classList.remove("error"));let btn=document.getElementById("copyBtn");btn.innerText="Copy für Worldline";btn.classList.remove("success")}
function clearForm(){document.getElementById("vorname").value="";document.getElementById("nachname").value="";tarif=null;selected=[];document.getElementById("selectedTarif").innerText="Tarif";document.getElementById("dropdown").classList.remove("active");currentReceipt=null;barDone=false;render();calc();resetState()}
function copy(){if(!validateSale())return;let name=`${document.getElementById("vorname").value.trim()} ${document.getElementById("nachname").value.trim()}`;let tarifKurz=tarif==="Standard"?"S":"L";let nums=selected.map(getNummer).sort((a,b)=>a-b);let text=`${name}, ${tarifKurz}, ${nums.join("+")}`;navigator.clipboard.writeText(text);let btn=document.getElementById("copyBtn");btn.innerText="Kopiert ✓";btn.classList.add("success");setTimeout(clearForm,650)}
function nextBarNumber(){let n=parseInt(localStorage.getItem("mrbeauty_next_bar")||"1",10);localStorage.setItem("mrbeauty_next_bar",String(n+1));return "BAR-"+String(n).padStart(5,"0")}
function makeReceipt(){if(currentReceipt)return currentReceipt;let now=new Date();let date=now.toLocaleDateString("de-CH",{day:"2-digit",month:"2-digit",year:"numeric"});let time=now.toLocaleTimeString("de-CH",{hour:"2-digit",minute:"2-digit"});currentReceipt={nr:nextBarNumber(),date,time,customer:`${document.getElementById("vorname").value.trim()} ${document.getElementById("nachname").value.trim()}`,items:selected.map(name=>({name,price:getPreis(name)})),total:totalAmount()};return currentReceipt}
function startBarzahlung(){if(!validateSale())return;document.getElementById("payAmount").innerText="CHF "+totalAmount().toFixed(2);document.getElementById("payModal").classList.add("show")}
function editPayment(){document.getElementById("payModal").classList.remove("show")}
function finishNoReceipt(){makeReceipt();document.getElementById("payModal").classList.remove("show");clearForm()}
function escapeHtml(s){return String(s).replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;"}[c]))}
function renderReceiptHtml(r){let rows=r.items.map(it=>`<div class="serviceRow"><div class="serviceBullet">•</div><div class="serviceName">${escapeHtml(it.name)}</div><div class="serviceCurrency">CHF</div><div class="servicePrice">${it.price.toFixed(2)}</div></div>`).join("");return `<img src="logo_quittung.png" class="receiptLogo" alt="MR BEAUTY"><div class="receiptCompany">MR Beauty Vlora Iseni<span class="sep">|</span>Adlikerstrasse 255<span class="sep">|</span>8105 Regensdorf</div><div class="receiptDash"></div><h1 class="receiptTitle">QUITTUNG</h1><div class="receiptInfo"><div class="receiptInfoCol"><div>Quittung Nr.:</div><div class="receiptValue">${escapeHtml(r.nr)}</div><div>Kundin:</div><div class="receiptValue">${escapeHtml(r.customer)}</div></div><div class="receiptInfoCol right"><div>Datum:</div><div class="receiptValue">${escapeHtml(r.date)}</div><div>Uhrzeit:</div><div class="receiptValue">${escapeHtml(r.time)}</div></div></div><hr class="receiptRule"><h2 class="receiptSectionTitle">Leistungen</h2><div class="serviceList">${rows}</div><hr class="receiptRule"><div class="summary"><div class="summaryRow"><div>Betrag:</div><div class="summaryValue">CHF&nbsp;&nbsp;${r.total.toFixed(2)}</div></div><div class="summaryRow"><div>Zahlungsart:</div><div class="summaryValue">Barzahlung</div></div><div class="vatNote">Nicht MWST-pflichtig</div></div><hr class="receiptRule"><div class="receiptFooter"><img src="herz.png" class="receiptHeart" alt=""><p class="thanks">Vielen Dank für Ihren Besuch!</p><p class="comeAgain">Wir freuen uns, Sie bald wieder begrüssen zu dürfen.</p></div>`}
function showReceipt(){const r=makeReceipt();document.getElementById("receiptPaper").innerHTML=renderReceiptHtml(r);document.getElementById("payModal").classList.remove("show");document.getElementById("receiptView").classList.add("show");document.getElementById("receiptView").scrollTop=0}
function closeReceipt(){document.getElementById("receiptView").classList.remove("show");clearForm()}
function sendEmailReceipt(){const r=makeReceipt();const body=`MR Beauty Vlora Iseni%0AAdlikerstrasse 255%0A8105 Regensdorf%0A%0AQUITTUNG%0AQuittung Nr.: ${encodeURIComponent(r.nr)}%0ADatum: ${encodeURIComponent(r.date)}%0AUhrzeit: ${encodeURIComponent(r.time)}%0AKundin: ${encodeURIComponent(r.customer)}%0A%0ALeistungen:%0A${encodeURIComponent(r.items.map(i=>`- ${i.name} CHF ${i.price.toFixed(2)}`).join("\n"))}%0A%0ABetrag: CHF ${r.total.toFixed(2)}%0AZahlungsart: Barzahlung%0ANicht MWST-pflichtig`;window.location.href=`mailto:?subject=MR Beauty Quittung ${encodeURIComponent(r.nr)}&body=${body}`;setTimeout(clearForm,500)}
function showQrInfo(){showReceipt()}
render();calc();
</script>
