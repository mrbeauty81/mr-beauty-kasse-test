const firebaseConfig = {

  authDomain: "mr-beauty-apps.firebaseapp.com",
  projectId: "mr-beauty-apps",

  messagingSenderId: "470222444902",
  appId: "1:470222444902:web:c54872a96d964a78ca90a7"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

let rememberLogin = localStorage.getItem("mrbeauty_kasse_remember") !== "0";

function applyRememberUI(){
const box=document.getElementById("rememberBox");
if(!box) return;
box.classList.toggle("off", !rememberLogin);
}

function toggleRemember(){
rememberLogin=!rememberLogin;
localStorage.setItem("mrbeauty_kasse_remember", rememberLogin ? "1" : "0");
applyRememberUI();
}

function hideLoginError(){
const e=document.getElementById("loginError");
if(e){
e.classList.remove("show");
e.innerText="";
}
}

function showLoginError(text){
const e=document.getElementById("loginError");
if(e){
e.innerText=text;
e.classList.add("show");
}
}

function toggleLoginPassword(){
const p=document.getElementById("loginPassword");
if(!p) return;
p.type = p.type === "password" ? "text" : "password";
}

async function loginWithFirebase(){
hideLoginError();
const email=document.getElementById("loginEmail").value.trim();
const pass=document.getElementById("loginPassword").value;

if(!email || !pass){
showLoginError("Bitte E-Mail und Passwort eingeben.");
return;
}

try{
await auth.setPersistence(
rememberLogin ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION
);
await auth.signInWithEmailAndPassword(email, pass);
}catch(err){
showLoginError("Login nicht möglich. Bitte E-Mail und Passwort prüfen.");
}
}

async function forgotPassword(){
hideLoginError();
const email=document.getElementById("loginEmail").value.trim();
if(!email){
showLoginError("Bitte zuerst deine E-Mail-Adresse eingeben.");
return;
}
try{
await auth.sendPasswordResetEmail(email);
showLoginError("E-Mail zum Zurücksetzen wurde gesendet.");
}catch(err){
showLoginError("E-Mail konnte nicht gesendet werden. Bitte Adresse prüfen.");
}
}

async function logoutFirebase(){
await auth.signOut();
}

function showLoginOnly(){
document.body.classList.remove("auth-loading","logged-in");
document.body.classList.add("logged-out");
}

function showAppAfterLogin(){
document.body.classList.remove("auth-loading","logged-out");
document.body.classList.add("logged-in");
}

auth.onAuthStateChanged(function(user){
if(user){
showAppAfterLogin();
}else{
showLoginOnly();
}
});

document.addEventListener("DOMContentLoaded", function(){
applyRememberUI();
hideLoginError();
const email=document.getElementById("loginEmail");
const pass=document.getElementById("loginPassword");
if(email) email.addEventListener("input", hideLoginError);
if(pass) pass.addEventListener("input", hideLoginError);
if(pass) pass.addEventListener("keydown", function(e){ if(e.key==="Enter") loginWithFirebase(); });
if(email) email.addEventListener("keydown", function(e){ if(e.key==="Enter") loginWithFirebase(); });
});

"Gel-Neumodellage Naturnagel":{price:45,n:18},
"Auffüllen Natur":{price:45,n:19},
"Wimpernverlängerung Volumen":{price:80,n:20},
"Wimpern Volumen auffüllen":{price:50,n:21},
"Wimpernverlängerung Natur":{price:70,n:22},
"Wimpern Natur auffüllen":{price:50,n:23},
"Wimpern entfernen":{price:20,n:24}
};

function getPreis(name){
if(tarif==="Lehrling" && lehrling[name]) return lehrling[name].price;
return standard[name].price;
}

function getNummer(name){
if(tarif==="Lehrling" && lehrling[name]) return lehrling[name].n;
return standard[name].n;
}

function render(){
let c=document.getElementById("buttons");
c.innerHTML="";

Object.keys(standard).forEach(name=>{
let d=document.createElement("div");

d.className="btn";
if(selected.includes(name)) d.classList.add("active");

d.innerText=name+"\nCHF "+getPreis(name);

d.onclick=()=>{
selected.includes(name)?
selected=selected.filter(s=>s!==name):
selected.push(name);

render();
calc();
resetState();
};

c.appendChild(d);
});
}

function calc(){
let t=0;
selected.forEach(s=>t+=getPreis(s));
document.getElementById("total").innerText="CHF "+t.toFixed(2);
}

function toggleDropdown(){
let d=document.getElementById("dropdownList");
d.style.display=d.style.display==="block"?"none":"block";
}

function selectTarif(t){
tarif=t;
document.getElementById("selectedTarif").innerText=t;
document.getElementById("dropdown").classList.add("active");
document.getElementById("dropdownList").style.display="none";

render();
calc();
resetState();
}

function resetState(){

document.getElementById("vorname").classList.remove("error");
document.getElementById("nachname").classList.remove("error");
document.getElementById("dropdown").classList.remove("error");
document.querySelectorAll(".btn").forEach(b=>b.classList.remove("error"));

let btn=document.getElementById("copyBtn");
btn.innerText="Copy für Worldline";
btn.classList.remove("success");
}

function copy(){
if(!validateSale()) return;
let name=`${document.getElementById("vorname").value.trim()} ${document.getElementById("nachname").value.trim()}`;
let tarifKurz=tarif==="Standard"?"S":"L";
let nums=selected.map(getNummer).sort((a,b)=>a-b);
let text=`${name}, ${tarifKurz}, ${nums.join("+")}`;
navigator.clipboard.writeText(text);
let btn=document.getElementById("copyBtn");
btn.innerText="Kopiert ✓";
btn.classList.add("success");
setTimeout(resetSaleForm, 700);
}
function getTotalAmount(){
let t=0;
selected.forEach(s=>t+=getPreis(s));
return t;
}

function validateSale(){
let vor=document.getElementById("vorname");
let nach=document.getElementById("nachname");
let drop=document.getElementById("dropdown");
let valid=true;
if(!vor.value.trim()){ vor.classList.add("error"); valid=false; }
if(!nach.value.trim()){ nach.classList.add("error"); valid=false; }
if(!tarif){ drop.classList.add("error"); valid=false; }
if(selected.length===0){
  document.querySelectorAll(".btn").forEach(b=>b.classList.add("error"));
  valid=false;
}
return valid;
}

function nextReceiptNo(peek=false){
let n=parseInt(localStorage.getItem("mrbeauty_bar_counter") || "1",10);
if(!peek){ localStorage.setItem("mrbeauty_bar_counter", String(n+1)); }
return "BAR-" + String(n).padStart(5,"0");
}

function currentReceiptNo(){
if(!window.pendingReceiptNo) window.pendingReceiptNo = nextReceiptNo(true);
return window.pendingReceiptNo;
}

function commitReceiptNo(){
const nr=currentReceiptNo();
nextReceiptNo(false);
window.pendingReceiptNo=null;
return nr;
}

function resetSaleForm(){
document.getElementById("vorname").value="";
document.getElementById("nachname").value="";
tarif=null;
selected=[];
document.getElementById("selectedTarif").innerText="Tarif";
document.getElementById("dropdown").classList.remove("active");
render();
calc();
resetState();
}

function getSaleData(commit=false){
const now=new Date();
const datum=String(now.getDate()).padStart(2,"0")+"."+String(now.getMonth()+1).padStart(2,"0")+"."+now.getFullYear();
const uhrzeit=String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
const nr=commit ? commitReceiptNo() : currentReceiptNo();
return {
  nr,
  datum,
  uhrzeit,
  kundin:(document.getElementById("vorname").value.trim()+" "+document.getElementById("nachname").value.trim()).trim(),
  services:selected.map(name=>({name, price:getPreis(name)})),
  total:getTotalAmount()
};
}

function chf(v){ return "CHF " + Number(v).toFixed(2); }

function openCashDialog(){
if(!validateSale()) return;
window.pendingReceiptNo=null;
document.getElementById("payAmount").innerText=chf(getTotalAmount());
document.getElementById("payOverlay").classList.add("show");
}

function closeCashDialog(){
document.getElementById("payOverlay").classList.remove("show");
}

function buildReceiptHTML(data){
const rows=data.services.map(s=>`<div class="serviceRow"><div class="serviceName">${escapeHtml(s.name)}</div><div class="serviceCHF">CHF</div><div class="servicePrice">${Number(s.price).toFixed(2)}</div></div>`).join("");
return `
<img class="receiptLogo" src="logo_quittung.png" alt="MR Beauty">
<div class="receiptBusiness">MR Beauty Vlora Iseni <span class="sep">|</span> Adlikerstrasse 255 <span class="sep">|</span> 8105 Regensdorf</div>
<div class="receiptDash"></div>
<h1 class="receiptTitle">QUITTUNG</h1>
<div class="receiptMeta">
  <div class="metaPair"><span class="metaLabel">Quittung Nr.:</span><span class="metaValue">${escapeHtml(data.nr)}</span></div>
  <div class="metaPair right"><span class="metaLabel">Datum:</span><span class="metaValue">${escapeHtml(data.datum)}</span></div>
  <div class="metaPair"><span class="metaLabel">Kundin:</span><span class="metaValue">${escapeHtml(data.kundin)}</span></div>
  <div class="metaPair right"><span class="metaLabel">Uhrzeit:</span><span class="metaValue">${escapeHtml(data.uhrzeit)}</span></div>
</div>
<div class="receiptLine"></div>
<div class="servicesTitle">Leistungen</div>
<div class="serviceRows">${rows}</div>
<div class="receiptLine"></div>
<div class="receiptSummary">
  <div class="summaryLabel">Betrag:</div><div class="summaryValue">${chf(data.total)}</div>
  <div class="summaryLabel">Zahlungsart:</div><div class="summaryValue">Barzahlung</div>
</div>
<div class="taxNote">Nicht MWST-pflichtig</div>
<div class="receiptLine"></div>
<img class="receiptHeart" src="herz.png" alt="Herz">
<div class="receiptThanks">Vielen Dank für Ihren Besuch!</div>
<p class="receiptReturn">Wir freuen uns, Sie bald wieder begrüssen zu dürfen.</p>`;
}

function escapeHtml(str){
return String(str).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
}

function openReceiptDetails(commitAfterClose=false){
const data=getSaleData(false);
window.finishAfterReceiptClose=!!commitAfterClose;
document.getElementById("receiptPaper").innerHTML=buildReceiptHTML(data);
document.getElementById("receiptOverlay").classList.add("show");
}

function closeReceiptDetails(){
document.getElementById("receiptOverlay").classList.remove("show");
if(window.finishAfterReceiptClose){
  commitReceiptNo();
  closeCashDialog();
  resetSaleForm();
  window.finishAfterReceiptClose=false;
}
}

function showReceiptQR(){
// Testversion ohne Firebase: QR öffnet vorerst die Quittungsansicht.
openReceiptDetails(false);
}

function sendReceiptEmail(){
// Testversion ohne PDF-Anhang: öffnet Mail mit Quittungsdaten als Text.
const d=getSaleData(false);
const lines=[
'MR Beauty Vlora Iseni', 'Adlikerstrasse 255', '8105 Regensdorf', '',
'QUITTUNG', 'Quittung Nr.: '+d.nr, 'Datum: '+d.datum, 'Uhrzeit: '+d.uhrzeit, 'Kundin: '+d.kundin, '',
'Leistungen:', ...d.services.map(s=>'• '+s.name+' - '+chf(s.price)), '',
'Betrag: '+chf(d.total), 'Zahlungsart: Barzahlung', 'Nicht MWST-pflichtig', '',
'Vielen Dank für Ihren Besuch!'
];
location.href='mailto:?subject='+encodeURIComponent('MR Beauty Quittung '+d.nr)+'&body='+encodeURIComponent(lines.join('\n'));
}

function finishCashWithoutReceipt(){
commitReceiptNo();
closeCashDialog();
resetSaleForm();
}

render();
calc();

</script>

</body>
</html>
